<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PromptFold settings</title>
    <style>
      :root {
        color-scheme: light dark;
        --ink: #1c1c1f; --muted: #56565c; --faint: #8a8a90;
        --line: #e2e2e6; --bg: #f6f6f7; --card: #ffffff;
        --accent: #2f7f7a; --field: #ffffff;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --ink: #ededee; --muted: #a6a6ac; --faint: #7d7d83;
          --line: #34343a; --bg: #161618; --card: #1f1f22;
          --accent: #3aa19a; --field: #161618;
        }
      }
      * { box-sizing: border-box; }
      body {
        margin: 0; background: var(--bg); color: var(--ink);
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      }
      #root { max-width: 620px; margin: 0 auto; padding: 40px 24px 64px; }
      h1 { font-size: 22px; margin: 0 0 4px; }
      .sub { color: var(--muted); margin: 0 0 24px; font-size: 14px; line-height: 1.5; }
      .card {
        background: var(--card); border: 1px solid var(--line); border-radius: 14px;
        padding: 22px; margin-bottom: 18px;
      }
      .field { margin-bottom: 18px; }
      .field:last-child { margin-bottom: 0; }
      label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: var(--ink); }
      select, input {
        width: 100%; padding: 10px 12px; border-radius: 9px; font-size: 14px;
        border: 1px solid var(--line); background: var(--field); color: var(--ink);
      }
      select:focus, input:focus { outline: 2px solid var(--accent); outline-offset: 0; border-color: var(--accent); }
      .hint { font-size: 12.5px; color: var(--muted); margin-top: 7px; line-height: 1.5; }
      .cost {
        display: flex; align-items: center; gap: 8px; margin-top: 10px;
        font-size: 12.5px; color: var(--muted); line-height: 1.5;
      }
      .dollars { font-weight: 700; color: var(--accent); letter-spacing: 1px; white-space: nowrap; }
      .row { display: flex; align-items: center; gap: 12px; }
      .btn {
        background: var(--accent); color: #fff; border: none; border-radius: 9px;
        padding: 11px 18px; font-size: 14px; font-weight: 600; cursor: pointer;
      }
      .btn:hover { filter: brightness(1.05); }
      .saved { color: #2f9e44; font-size: 14px; font-weight: 600; }
      a { color: var(--accent); }
      .foot { font-size: 12.5px; color: var(--faint); margin-top: 28px; line-height: 1.6; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="options.js"></script>
  </body>
</html>
